name: Build CryptoWatch APK

on:
  push:
    branches:
      - main
      - release/**
      - claude/**
      - fix_*
      - Fix_*
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Installa dipendenze npm
        run: npm ci || npm install

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret is not configured"
            exit 1
          fi
          mkdir -p android/app
          printf '%s' "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Leggi versione base
        id: ver
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          echo "base=$BASE" >> $GITHUB_OUTPUT
          echo "full=$BASE.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build web app
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VITE_BACKEND_API_BASE_URL: ${{ secrets.VITE_BACKEND_API_BASE_URL }}
          VITE_API_DEVICE_TOKEN: ${{ secrets.VITE_API_DEVICE_TOKEN }}
        run: npm run build

      - name: Sync Capacitor assets in Android
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -PbuildNumber=${{ github.run_number }} -PbaseVersion=${{ steps.ver.outputs.base }}

      - name: Rinomina APK con versione
        run: |
          APK_NAME="CryptoSentinelAI-v${{ steps.ver.outputs.full }}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          cp "$APK_NAME" CryptoSentinelAI-latest.apk
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: Upload APK come artefatto CI
        uses: actions/upload-artifact@v4
        with:
          name: apk-artifact
          path: |
            ${{ env.APK_NAME }}
            CryptoSentinelAI-latest.apk
          retention-days: 30

      - name: Aggiorna release dev (tutti i branch)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true
          sleep 2
          gh release create dev \
            --title "CryptoSentinelAI Dev v${{ steps.ver.outputs.full }}" \
            --notes "Branch: ${{ github.ref_name }} | Build #${{ github.run_number }} del $(date '+%d/%m/%Y %H:%M')" \
            --prerelease \
            "${{ env.APK_NAME }}"

      - name: Pubblica release latest (solo main)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.full }}"
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          sleep 2
          gh release create "$TAG" \
            --title "CryptoSentinelAI $TAG" \
            --notes "Build automatica dal branch main — run #${{ github.run_number }} del $(date '+%d/%m/%Y %H:%M')" \
            --latest \
            "${{ env.APK_NAME }}"

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scarica APK dall'artefatto
        uses: actions/download-artifact@v4
        with:
          name: apk-artifact

      - name: Prepara cartella Pages
        run: |
          mkdir -p pages-dist
          cp docs/index.html pages-dist/index.html
          cp CryptoSentinelAI-latest.apk pages-dist/
          cp CryptoSentinelAI-*.apk pages-dist/ 2>/dev/null || true
          # Alias retrocompatibilità per APK installati prima del rename
          cp CryptoSentinelAI-latest.apk pages-dist/CryptoSentinel-debug.apk

      - name: Upload artefatto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

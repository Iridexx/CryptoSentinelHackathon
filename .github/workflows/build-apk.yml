name: Build CryptoWatch APK

on:
  push:
    branches:
      - claude/crypto-price-monitor-app-RpMFm
      - claude/gradlew-missing-build-pYXQT
      - claude/energy-saving-toggle-AsdD9
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Installa dipendenze npm
        run: npm ci

      - name: Build web app
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: npm run build

      - name: Sync Capacitor assets in Android
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -PbuildNumber=${{ github.run_number }}

      - name: Rinomina APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk CryptoWatch-debug.apk

      - name: Aggiorna release dev (tutti i branch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true
          sleep 2
          gh release create dev \
            --title "Dev Build #${{ github.run_number }}" \
            --notes "Branch: ${{ github.ref_name }} | Build #${{ github.run_number }} del $(date '+%d/%m/%Y %H:%M')" \
            --prerelease \
            CryptoWatch-debug.apk

      - name: Pubblica release latest (solo main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          sleep 3
          gh release create latest \
            --title "CryptoWatch - Build ${{ github.run_number }}" \
            --notes "Aggiornamento automatico del $(date '+%d/%m/%Y alle %H:%M')" \
            --latest \
            CryptoWatch-debug.apk

      - name: Upload APK come artefatto CI
        uses: actions/upload-artifact@v6
        with:
          name: CryptoWatch-debug.apk
          path: CryptoWatch-debug.apk
          retention-days: 30

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Scarica APK dall'artefatto
        uses: actions/download-artifact@v7
        with:
          name: CryptoWatch-debug.apk

      - name: Prepara cartella Pages
        run: mkdir -p pages-dist && cp CryptoWatch-debug.apk pages-dist/

      - name: Upload artefatto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy su GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

name: Build CryptoWatch APK

on:
  push:
    branches:
      - claude/crypto-price-monitor-app-RpMFm
      - claude/gradlew-missing-build-pYXQT
      - claude/energy-saving-toggle-AsdD9
      - claude/fix-001-muQ1X
      - Fix_001
      - main
      - release/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Installa dipendenze npm
        run: npm ci

      - name: Build web app
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: npm run build

      - name: Sync Capacitor assets in Android
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -PbuildNumber=${{ github.run_number }}

      - name: Rinomina APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk CryptoSentinel-debug.apk

      - name: Aggiorna release dev (tutti i branch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true
          sleep 2
          gh release create dev \
            --title "CryptoSentinel Dev #${{ github.run_number }}" \
            --notes "Branch: ${{ github.ref_name }} | Build #${{ github.run_number }} del $(date '+%d/%m/%Y %H:%M')" \
            --prerelease \
            CryptoSentinel-debug.apk

      - name: Pubblica release latest (solo main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: |
            ## CryptoSentinel v1.1.1

            ### Novità

            • **Allarmi range prezzo** — notifica quando il prezzo entra o esce da un intervallo min–max
            • **Alert immediato** — scatta subito se il prezzo supera già la soglia al momento della creazione
            • **Grafici** — linee di soglia con stile LargeDashed e frecce ▲/▼
            • **Notifiche** — ID deterministici (hash) per eliminare duplicati; cooldown 5 min sui preferiti
            • **Fav alerts** — notifica popup in-app al movimento % configurabile
            • **Schermata di avvio** — animazione faro all'avvio a freddo (tocca per saltare)
            • **WorkManager** — fix loop di backoff esponenziale (non si ferma più dopo ore di inattività)
            • **Header** — nuovo logo faro SVG con gradiente blu premium
            • **Navigazione** — bottom bar con icone SVG vettoriali
            • **Popup aggiornamento** — tasti Ignora, Dopo (snooze 4h) e Scarica
            • **Impostazioni** — link a CoinGecko, multi-valuta USD/EUR/BTC, animazione rank
            • **Pagina web** — landing page su GitHub Pages con download automatico
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release delete v1.1.1 --yes --cleanup-tag 2>/dev/null || true
          sleep 3
          gh release create v1.1.1 \
            --title "CryptoSentinel v1.1.1" \
            --notes "$RELEASE_NOTES" \
            --latest \
            CryptoSentinel-debug.apk

      - name: Upload APK come artefatto CI
        uses: actions/upload-artifact@v6
        with:
          name: CryptoSentinel-debug.apk
          path: CryptoSentinel-debug.apk
          retention-days: 30

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Scarica APK dall'artefatto
        uses: actions/download-artifact@v7
        with:
          name: CryptoSentinel-debug.apk

      - name: Prepara cartella Pages
        run: |
          mkdir -p pages-dist
          cp docs/index.html pages-dist/index.html
          cp CryptoSentinel-debug.apk pages-dist/

      - name: Upload artefatto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy su GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

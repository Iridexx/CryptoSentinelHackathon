name: Build CryptoWatch APK

on:
  push:
    branches:
      - claude/crypto-price-monitor-app-RpMFm
      - claude/gradlew-missing-build-pYXQT
      - claude/energy-saving-toggle-AsdD9
      - claude/fix-001-muQ1X
      - Fix_001
      - main
      - release/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Installa dipendenze npm
        run: npm ci || npm install

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret is not configured"
            exit 1
          fi
          mkdir -p android/app
          printf '%s' "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Build web app
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: npm run build

      - name: Sync Capacitor assets in Android
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -PbuildNumber=${{ github.run_number }}

      - name: Rinomina APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk CryptoSentinel-debug.apk

      - name: Aggiorna release dev (tutti i branch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true
          sleep 2
          gh release create dev \
            --title "CryptoSentinel Dev #${{ github.run_number }}" \
            --notes "Branch: ${{ github.ref_name }} | Build #${{ github.run_number }} del $(date '+%d/%m/%Y %H:%M')" \
            --prerelease \
            CryptoSentinel-debug.apk

      - name: Pubblica release latest (solo main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: |
            ## CryptoSentinel v1.2.0

            ### Novità

            • **Allarmi range prezzo** — notifica quando il prezzo entra o esce da un intervallo min–max
            • **Alert immediato** — scatta subito se il prezzo supera già la soglia al momento della creazione
            • **Grafici** — linee di soglia con stile LargeDashed e frecce ▲/▼
            • **Notifiche** — ID deterministici (hash) per eliminare duplicati; cooldown 5 min sui preferiti
            • **Fav alerts** — notifica popup in-app al movimento % configurabile
            • **Schermata di avvio** — animazione faro all'avvio a freddo (tocca per saltare)
            • **WorkManager** — fix loop di backoff esponenziale (non si ferma più dopo ore di inattività)
            • **Header** — nuovo logo faro SVG con gradiente blu premium
            • **Navigazione** — bottom bar con icone SVG vettoriali
            • **Popup aggiornamento** — tasti Ignora, Dopo (snooze 4h) e Scarica
            • **Impostazioni** — link a CoinGecko, multi-valuta USD/EUR/BTC, animazione rank
            • **Pagina web** — landing page su GitHub Pages con download automatico

            ### Aggiornamenti recenti

            • **Schermata di avvio** — fix tocca-per-saltare: il tap ora funziona correttamente su tutti i dispositivi
            • **Rilevamento aggiornamenti** — il controllo ora avviene ogni 30 minuti anche a app aperta (non solo al riavvio)
            • **QR code donazioni** — tasto QR accanto a Copia in "Supporta sviluppatore" per Bitcoin, Lightning e EVM
            • **Contatore download** — la pagina web ora mostra il totale cumulativo dei download da tutte le release
            • **Alert scattati** — data e ora di scatto visibili nella card accanto al badge giallo
            • **Fix rilevamento aggiornamenti** — confronto build number corretto (non più basato sul numero di patch semver)
            • **Grafico interattivo** — il prezzo in alto a destra segue il pallino mentre si scorre il grafico
            • **Alert reattivi** — la card si aggiorna come "Scattato" istantaneamente, senza ritardi
            • **Download aggiornamento** — avvio diretto senza aprire l'app GitHub; banner di stato unificato con SettingsTab
            • **Alert** — rimossa icona matita dalle card alert (non più necessaria)
            • **Popup aggiornamento** — segno di spunta cliccabile apre direttamente la cartella Download senza modal intermedio
            • **Fix freccia aggiornamento** — la freccia ora appare sempre al riavvio anche se il popup era stato ignorato
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release delete v1.2.0 --yes --cleanup-tag 2>/dev/null || true
          gh release delete v1.1.1 --yes --cleanup-tag 2>/dev/null || true
          sleep 3
          gh release create v1.2.0 \
            --title "CryptoSentinel v1.2 #${{ github.run_number }}" \
            --notes "$RELEASE_NOTES" \
            --latest \
            CryptoSentinel-debug.apk

      - name: Upload APK come artefatto CI
        uses: actions/upload-artifact@v6
        with:
          name: CryptoSentinel-debug.apk
          path: CryptoSentinel-debug.apk
          retention-days: 30

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Scarica APK dall'artefatto
        uses: actions/download-artifact@v7
        with:
          name: CryptoSentinel-debug.apk

      - name: Prepara cartella Pages
        run: |
          mkdir -p pages-dist
          cp docs/index.html pages-dist/index.html
          cp CryptoSentinel-debug.apk pages-dist/

      - name: Pubblica su branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages-dist
          force_orphan: true
